<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Two Numbers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  >
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    input[type="number"] { -webkit-appearance: none; appearance: none; }
  </style>
</head>
<body class="h-full flex items-center justify-center">
  <div class="max-w-md w-full mx-auto p-8">
    <div class="bg-gray-900 rounded-3xl shadow-2xl p-10 border border-gray-800">

      <!-- Header -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-500 text-white rounded-2xl mb-4">
          <i class="fa-solid fa-plus text-3xl"></i>
        </div>
        <h1 class="text-4xl font-bold text-white tracking-tight">Add Two Numbers</h1>
        <p class="text-gray-400 mt-2">Simple. Fast. Beautiful.</p>
      </div>

      <!-- Inputs -->
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2" for="num1">First Number</label>
          <input
            type="number"
            id="num1"
            class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-5 text-2xl text-white focus:outline-none focus:border-blue-500 transition-colors"
            placeholder="Enter first number"
            step="any"
          >
        </div>

        <div class="flex justify-center">
          <div class="text-5xl text-gray-700">+</div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2" for="num2">Second Number</label>
          <input
            type="number"
            id="num2"
            class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-5 text-2xl text-white focus:outline-none focus:border-blue-500 transition-colors"
            placeholder="Enter second number"
            step="any"
          >
        </div>
      </div>

      <!-- Result -->
      <div class="mt-10 bg-gray-950 border border-gray-700 rounded-2xl p-8 text-center min-h-[120px] flex items-center justify-center">
        <div id="resultLabel" class="hidden text-blue-400 text-sm font-medium tracking-widest mb-2">RESULT</div>
        <div id="resultContent" class="text-gray-500 text-3xl">Result will appear here</div>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-2 gap-4 mt-8">
        <button
          id="calculateBtn"
          class="bg-blue-600 hover:bg-blue-500 transition-colors text-white font-semibold text-lg py-5 rounded-2xl flex items-center justify-center gap-2">
          <i class="fa-solid fa-equals"></i>
          Calculate
        </button>
        <button
          id="clearBtn"
          class="bg-gray-700 hover:bg-gray-600 transition-colors text-white font-semibold text-lg py-5 rounded-2xl">
          Clear
        </button>
      </div>

      <!-- Footer -->
      <div class="text-center text-gray-500 text-sm mt-8">Built with JavaScript ES6</div>
    </div>
  </div>

  <script>
    const num1Input = document.getElementById('num1');
    const num2Input = document.getElementById('num2');
    const resultContent = document.getElementById('resultContent');
    const resultLabel = document.getElementById('resultLabel');
    const calculateBtn = document.getElementById('calculateBtn');
    const clearBtn = document.getElementById('clearBtn');

    function formatSum(sum) {
      // Strip floating-point noise while preserving meaningful decimals
      return parseFloat(sum.toPrecision(12)).toString();
    }

    function addNumbers() {
      const num1 = parseFloat(num1Input.value);
      const num2 = parseFloat(num2Input.value);

      if (isNaN(num1) || isNaN(num2)) {
        resultLabel.classList.add('hidden');
        resultContent.className = 'text-red-400 text-2xl';
        resultContent.textContent = 'Please enter valid numbers';
        return;
      }

      resultLabel.classList.remove('hidden');
      resultContent.className = 'text-white text-6xl font-light';
      resultContent.textContent = formatSum(num1 + num2);
    }

    function clearAll() {
      num1Input.value = '';
      num2Input.value = '';
      resultLabel.classList.add('hidden');
      resultContent.className = 'text-gray-500 text-3xl';
      resultContent.textContent = 'Result will appear here';
      num1Input.focus();
    }

    calculateBtn.addEventListener('click', addNumbers);
    clearBtn.addEventListener('click', clearAll);

    num1Input.addEventListener('input', () => {
      if (num1Input.value && num2Input.value) addNumbers();
    });

    num2Input.addEventListener('input', () => {
      if (num1Input.value && num2Input.value) addNumbers();
    });

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addNumbers();
    });

    document.addEventListener('DOMContentLoaded', () => num1Input.focus());
  </script>
</body>
</html>
